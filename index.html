<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>部長AIチャットボット</title>
<style>
  body { margin:0; font-family: "Segoe UI","Hiragino Kaku Gothic ProN",sans-serif; background:#f5f7fb;}
  .container { display:flex; min-height:100vh; }
  .left { flex:1; padding:40px; background:linear-gradient(135deg,#eef3ff,#ffffff); position:relative; }
  .title { font-size:34px; font-weight:700; color:#1a2a5c; line-height:1.4; }
  .highlight { color:#2b6cff; }
  .subtitle { margin-top:10px; color:#555; }
  .hero-image { position:absolute; bottom:0; left:40px; width:42%; max-width:420px; }
  .chat-bubble { position:absolute; bottom:140px; left:35%; background:#fff; padding:16px 18px; border-radius:12px; box-shadow:0 8px 20px rgba(0,0,0,0.1); max-width:360px; }
  .right { width:600px; padding:20px; background:#fff; border-left:1px solid #ddd; }
  .iframe-wrapper { height:100%; border-radius:16px; border:2px solid #2b6cff; overflow:hidden; display:flex; flex-direction:column; }
  .iframe-header { background:#2b6cff; color:#fff; padding:12px; font-weight:600; }
  iframe { flex:1; border:none; }

  /* Mobile */
  @media (max-width: 900px){
    .container{ flex-direction:column; }
    .right{ width:100%; height:60vh; }
    .hero-image{ position:static; width:70%; margin-top:20px; }
    .chat-bubble{ position:static; margin-top:12px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="left">
    <div class="title">
      いつでも、どこでも、<br>
      部長とつながる。<br>
      <span class="highlight">部長AIチャットボット</span>
    </div>
    <div class="subtitle">
      powered by ifmame<br>
      業務・キャリアの相談を、気軽に。
    </div>

    <!-- 左画像（同梱ファイル） -->
    <img src="left-image.png" class="hero-image" alt="office woman">

    <div class="chat-bubble">
      部長！新規プロジェクトの進め方について<br>
      アドバイスをいただけますか？
    </div>
  </div>

  <div class="right">
    <div class="iframe-wrapper">
      <div class="iframe-header">部長AIチャット</div>
      <iframe src="https://kastanet-ui-dbf3h7czfzddega6.a01.azurefd.net/chat-detail/?client_id=902bca96-c509-47b0-bb22-f8f8d40b9620&api_key=juiewh132rgfgw"></iframe>
    </div>
  </div>
</div>
</body>
</html>
